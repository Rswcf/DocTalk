version: '3.9'

services:
  postgres:
    # Pinned to patch: avoids silent major/minor drift that could break
    # local dev after a docker-compose pull. Bump deliberately.
    image: postgres:16.6
    container_name: doctalk-postgres
    environment:
      POSTGRES_DB: doctalk
      POSTGRES_USER: doctalk
      POSTGRES_PASSWORD: doctalk
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  qdrant:
    # Must stay within qdrant-client's 3-minor support window. Current client
    # is 1.16.1 (backend/requirements.txt) so server 1.13–1.16 is safe. Prod
    # uses Railway's managed Qdrant service; this compose image is dev only.
    image: qdrant/qdrant:v1.14.1
    container_name: doctalk-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7.4.1-alpine
    container_name: doctalk-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    # MinIO uses date-tagged releases; pin to a specific stable build
    # rather than `latest` so bucket-level API behavior is reproducible.
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: doctalk-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data

volumes:
  pg_data:
  qdrant_data:
  redis_data:
  minio_data:

